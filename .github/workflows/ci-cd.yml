name: ci-cd

on:
  pull_request:
  push:

permissions:
  contents: read

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'
  REGISTRY_HOST: localhost:5000
  FRONTEND_REPO: job-frontend
  API_REPO: job-api
  WORKER_REPO: job-worker

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Python lint dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r api/requirements.txt -r worker/requirements.txt -r requirements-dev.txt

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint Python
        run: flake8 api worker tests

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Lint API Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: api/Dockerfile

      - name: Lint worker Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: worker/Dockerfile

      - name: Lint frontend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile

  test:
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r api/requirements.txt -r requirements-dev.txt

      - name: Run API unit tests
        run: pytest --cov=api --cov-report=term-missing --cov-report=xml tests/api

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-coverage
          path: coverage.xml
          if-no-files-found: error

  build:
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 20
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - uses: actions/checkout@v4

      - name: Wait for local registry
        run: |
          for _ in $(seq 1 30); do
            if curl -fsS "http://${REGISTRY_HOST}/v2/" >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Local registry did not become ready in time" >&2
          exit 1

      - name: Build and tag images
        run: |
          docker build -t "${REGISTRY_HOST}/${FRONTEND_REPO}:${GITHUB_SHA}" -t "${REGISTRY_HOST}/${FRONTEND_REPO}:latest" frontend
          docker build -t "${REGISTRY_HOST}/${API_REPO}:${GITHUB_SHA}" -t "${REGISTRY_HOST}/${API_REPO}:latest" api
          docker build -t "${REGISTRY_HOST}/${WORKER_REPO}:${GITHUB_SHA}" -t "${REGISTRY_HOST}/${WORKER_REPO}:latest" worker

      - name: Push images to local registry
        run: |
          docker push "${REGISTRY_HOST}/${FRONTEND_REPO}:${GITHUB_SHA}"
          docker push "${REGISTRY_HOST}/${FRONTEND_REPO}:latest"
          docker push "${REGISTRY_HOST}/${API_REPO}:${GITHUB_SHA}"
          docker push "${REGISTRY_HOST}/${API_REPO}:latest"
          docker push "${REGISTRY_HOST}/${WORKER_REPO}:${GITHUB_SHA}"
          docker push "${REGISTRY_HOST}/${WORKER_REPO}:latest"

      - name: Export image archives
        run: |
          mkdir -p artifacts
          docker save "${REGISTRY_HOST}/${FRONTEND_REPO}:${GITHUB_SHA}" "${REGISTRY_HOST}/${FRONTEND_REPO}:latest" | gzip > artifacts/frontend-image.tar.gz
          docker save "${REGISTRY_HOST}/${API_REPO}:${GITHUB_SHA}" "${REGISTRY_HOST}/${API_REPO}:latest" | gzip > artifacts/api-image.tar.gz
          docker save "${REGISTRY_HOST}/${WORKER_REPO}:${GITHUB_SHA}" "${REGISTRY_HOST}/${WORKER_REPO}:latest" | gzip > artifacts/worker-image.tar.gz

      - name: Upload image artifacts
        uses: actions/upload-artifact@v4
        with:
          name: docker-images
          path: artifacts/*.tar.gz
          if-no-files-found: error

  security_scan:
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Download built images
        uses: actions/download-artifact@v4
        with:
          name: docker-images
          path: artifacts

      - name: Load images
        run: |
          gunzip -c artifacts/frontend-image.tar.gz | docker load
          gunzip -c artifacts/api-image.tar.gz | docker load
          gunzip -c artifacts/worker-image.tar.gz | docker load

      - name: Scan frontend image
        id: scan_frontend
        continue-on-error: true
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.REGISTRY_HOST }}/${{ env.FRONTEND_REPO }}:${{ github.sha }}
          format: sarif
          output: frontend-trivy.sarif
          severity: CRITICAL
          exit-code: 1

      - name: Scan API image
        id: scan_api
        continue-on-error: true
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.REGISTRY_HOST }}/${{ env.API_REPO }}:${{ github.sha }}
          format: sarif
          output: api-trivy.sarif
          severity: CRITICAL
          exit-code: 1

      - name: Scan worker image
        id: scan_worker
        continue-on-error: true
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.REGISTRY_HOST }}/${{ env.WORKER_REPO }}:${{ github.sha }}
          format: sarif
          output: worker-trivy.sarif
          severity: CRITICAL
          exit-code: 1

      - name: Upload SARIF artifacts
        uses: actions/upload-artifact@v4
        with:
          name: trivy-sarif
          path: '*.sarif'
          if-no-files-found: error

      - name: Enforce CRITICAL vulnerability gate
        run: |
          [[ "${{ steps.scan_frontend.outcome }}" == "success" ]]
          [[ "${{ steps.scan_api.outcome }}" == "success" ]]
          [[ "${{ steps.scan_worker.outcome }}" == "success" ]]

  integration_test:
    runs-on: ubuntu-latest
    needs: security_scan
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Download built images
        uses: actions/download-artifact@v4
        with:
          name: docker-images
          path: artifacts

      - name: Load images
        run: |
          gunzip -c artifacts/frontend-image.tar.gz | docker load
          gunzip -c artifacts/api-image.tar.gz | docker load
          gunzip -c artifacts/worker-image.tar.gz | docker load

      - name: Create integration env file
        run: |
          cp .env.example .env.ci
          {
            echo "COMPOSE_PROJECT_NAME=jobprocessorci"
            echo "DOCKER_INTERNAL_NETWORK_NAME=jobprocessorci-internal"
            echo "DOCKER_EDGE_NETWORK_NAME=jobprocessorci-edge"
            echo "FRONTEND_IMAGE=${REGISTRY_HOST}/${FRONTEND_REPO}:${GITHUB_SHA}"
            echo "API_IMAGE=${REGISTRY_HOST}/${API_REPO}:${GITHUB_SHA}"
            echo "WORKER_IMAGE=${REGISTRY_HOST}/${WORKER_REPO}:${GITHUB_SHA}"
          } >> .env.ci

      - name: Run integration test
        run: |
          chmod +x scripts/integration-test.sh
          docker compose --env-file .env.ci config >/dev/null
          INTEGRATION_NO_BUILD=true ./scripts/integration-test.sh .env.ci

  deploy:
    runs-on: ubuntu-latest
    needs: integration_test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 20
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
    steps:
      - uses: actions/checkout@v4

      - name: Download built images
        uses: actions/download-artifact@v4
        with:
          name: docker-images
          path: artifacts

      - name: Prepare SSH
        run: |
          test -n "${DEPLOY_HOST}"
          test -n "${DEPLOY_USER}"
          test -n "${DEPLOY_SSH_KEY}"
          mkdir -p ~/.ssh
          printf '%s' "${DEPLOY_SSH_KEY}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${DEPLOY_HOST}" >> ~/.ssh/known_hosts

      - name: Prepare deploy env
        run: |
          cp .env.example deploy.env
          {
            echo "API_IMAGE=${API_REPO}:${GITHUB_SHA}"
            echo "FRONTEND_IMAGE=${FRONTEND_REPO}:${GITHUB_SHA}"
            echo "WORKER_IMAGE=${WORKER_REPO}:${GITHUB_SHA}"
          } >> deploy.env

      - name: Copy deploy payload to host
        run: |
          REMOTE_DIR="${DEPLOY_PATH:-jobprocessor-deploy}"
          ssh -i ~/.ssh/deploy_key "${DEPLOY_USER}@${DEPLOY_HOST}" "mkdir -p '${REMOTE_DIR}'"
          scp -i ~/.ssh/deploy_key artifacts/*.tar.gz scripts/deploy.sh deploy.env "${DEPLOY_USER}@${DEPLOY_HOST}:${REMOTE_DIR}/"

      - name: Run remote rolling deploy
        run: |
          REMOTE_DIR="${DEPLOY_PATH:-jobprocessor-deploy}"
          ssh -i ~/.ssh/deploy_key "${DEPLOY_USER}@${DEPLOY_HOST}" <<EOF
          set -euo pipefail
          cd "${REMOTE_DIR}"
          gunzip -c frontend-image.tar.gz | docker load
          gunzip -c api-image.tar.gz | docker load
          gunzip -c worker-image.tar.gz | docker load
          docker tag "${REGISTRY_HOST}/${FRONTEND_REPO}:${GITHUB_SHA}" "${FRONTEND_REPO}:${GITHUB_SHA}"
          docker tag "${REGISTRY_HOST}/${FRONTEND_REPO}:latest" "${FRONTEND_REPO}:latest"
          docker tag "${REGISTRY_HOST}/${API_REPO}:${GITHUB_SHA}" "${API_REPO}:${GITHUB_SHA}"
          docker tag "${REGISTRY_HOST}/${API_REPO}:latest" "${API_REPO}:latest"
          docker tag "${REGISTRY_HOST}/${WORKER_REPO}:${GITHUB_SHA}" "${WORKER_REPO}:${GITHUB_SHA}"
          docker tag "${REGISTRY_HOST}/${WORKER_REPO}:latest" "${WORKER_REPO}:latest"
          mv deploy.env .env
          chmod +x deploy.sh
          ./deploy.sh
          EOF

      - name: Verify deployed frontend
        run: curl -fsS "http://${DEPLOY_HOST}:3000/health" >/dev/null
